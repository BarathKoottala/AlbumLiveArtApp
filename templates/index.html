<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artwork Display</title>
    <link href='https://fonts.googleapis.com/css?family=Poppins' rel='stylesheet'>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div id="imageContainer" class="text-center">
        <div class="imageWrapper">
            <!-- The spin animation is applied to .vinyl (the wrapper), NOT the
                 <img>s, so crossfading the artwork inside never restarts it. -->
            <div id="vinyl" class="vinyl">
                <img id="art0" class="vinylArt active" src="{{ url_for('static', filename='vinyl.png') }}" alt="Album art">
                <img id="art1" class="vinylArt" alt="Album art">
            </div>
        </div>
        <div class="textContainer">
            <h1 id="trackName">Now Playing</h1>
            <p id="artistName"></p>
        </div>
        <div id="progressContainer"><div id="progressBar"></div></div>
    </div>

    <!-- Required attribution for the GetSongBPM tempo data (their API TOS). -->
    <footer id="credit"><a href="https://getsongbpm.com" target="_blank" rel="noopener">BPM data by GetSongBPM</a></footer>

<script type="text/javascript">
    const VINYL_SRC = "{{ url_for('static', filename='vinyl.png') }}";

    // How many beats make one full revolution. Lower = faster spin.
    // 8 beats/rev -> 120 BPM is a calm 4s per rotation.
    const BEATS_PER_REV = 8;
    const DEFAULT_PERIOD_S = 10;   // fallback when tempo (BPM) is unknown

    const vinyl = document.getElementById('vinyl');
    const imgs = [document.getElementById('art0'), document.getElementById('art1')];
    let activeImg = 0;

    // Playback state for client-side progress interpolation between polls.
    let lastArtVersion = -1;
    let progressBaseMs = 0, durationMs = 0, isPlaying = false, localSyncTs = 0;

    function getLuminance(r, g, b) {
        return 0.2126 * r + 0.7152 * g + 0.0722 * b;
    }

    function applyPalette(palette) {
        if (!palette || !palette.length) return;
        const c = palette[0];
        document.body.style.backgroundColor = `rgb(${c[0]},${c[1]},${c[2]})`;
        const textColor = getLuminance(c[0], c[1], c[2]) > 128 ? "black" : "white";
        document.getElementById("trackName").style.color = textColor;
        document.getElementById("artistName").style.color = textColor;
    }

    function applyTempo(tempo) {
        // One revolution every BEATS_PER_REV beats: period = (60/BPM) * beats.
        const period = tempo ? (60 / tempo) * BEATS_PER_REV : DEFAULT_PERIOD_S;
        vinyl.style.animationDuration = period.toFixed(3) + 's';
    }

    function crossfadeArt(version) {
        // Fade the artwork swap in/out by toggling stacked <img>s — the spinning
        // wrapper is untouched, so rotation stays smooth.
        const next = 1 - activeImg;
        const incoming = imgs[next];
        incoming.onload = function() {
            incoming.classList.add('active');
            imgs[activeImg].classList.remove('active');
            activeImg = next;
        };
        incoming.src = VINYL_SRC + '?v=' + version;   // cache-bust per art version
    }

    async function poll() {
        try {
            const res = await fetch('/nowPlaying', { headers: { 'Content-Type': 'application/json' } });
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const data = await res.json();

            // Track text
            document.getElementById('trackName').textContent = data.track || 'Now Playing';
            document.getElementById('artistName').textContent =
                data.artist ? `${data.artist}${data.album ? ' — ' + data.album : ''}` : '';

            applyPalette(data.palette);
            applyTempo(data.tempo);

            // Spin only while music is playing.
            isPlaying = !!data.is_playing;
            vinyl.style.animationPlayState = isPlaying ? 'running' : 'paused';

            // Re-sync the progress bar to the server's sample.
            progressBaseMs = data.progress_ms || 0;
            durationMs = data.duration_ms || 0;
            localSyncTs = Date.now();

            // Crossfade to new artwork only when the song actually changed.
            if (data.art_version !== lastArtVersion) {
                lastArtVersion = data.art_version;
                crossfadeArt(data.art_version);
            }
        } catch (err) {
            console.error('poll error:', err);
        }
    }

    function tickProgress() {
        // Smoothly advance the bar between polls using the local clock.
        if (durationMs > 0) {
            const elapsed = progressBaseMs + (isPlaying ? Date.now() - localSyncTs : 0);
            const pct = Math.max(0, Math.min(100, (elapsed / durationMs) * 100));
            document.getElementById('progressBar').style.width = pct + '%';
        }
        requestAnimationFrame(tickProgress);
    }

    document.addEventListener('DOMContentLoaded', function() {
        poll();
        setInterval(poll, 2000);
        requestAnimationFrame(tickProgress);
    });
</script>
</body>
</html>
