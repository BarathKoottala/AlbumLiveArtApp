<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artwork Display</title>
    <link href='https://fonts.googleapis.com/css?family=Poppins' rel='stylesheet'>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-info text-white">
    <div id="imageContainer" class="text-center">
        <div class="imageWrapper">
            <img id="dynamicImage" src="{{ url_for('static', filename='vinyl.png') }}?{{ time }}" alt="Image" width="300" height="300">
        </div>
        <div class="textContainer">
            <h1 id="currentlyPlaying">Now Playing</h1>
        </div>
    </div>
</body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>

<script type=text/javascript>

    const VINYL_SRC = "{{ url_for('static', filename='vinyl.png') }}";

    function refreshArtwork(){
        // Reuse the SAME <img> element. Replacing it (or recreating it) restarts
        // the CSS spin animation from 0deg, which is what caused the vinyl to
        // visibly snap/reset mid-rotation. Updating .src on the persistent
        // element reloads the artwork without restarting the animation.
        const img = document.getElementById('dynamicImage');

        img.onload = async function() {
            try {
                const dominantColor = await getPalette();
                if (!dominantColor) return;
                const rgbString = "rgb(" + dominantColor[0] + "," + dominantColor[1] + "," + dominantColor[2] + ")";
                document.body.style.backgroundColor = rgbString;
                changeHeaderBasedOnLuminance(dominantColor);
            } catch (error) {
                console.error('refreshArtwork error:', error);
            }
        };

        // Cache-bust so an updated vinyl.png is actually re-fetched.
        img.src = VINYL_SRC + '?' + Math.random();
    }

    function getLuminance(r,g,b){
        return 0.2126 * r + 0.7152 * g + 0.0722 * b;
    }

    function changeHeaderBasedOnLuminance(colorArray){
        luminance = getLuminance(colorArray[0], colorArray[1], colorArray[2]);
        if(luminance > 128) { // Halfway point on 255 scale
            textColor = "black";
        } else {
            textColor = "white";
        }
        document.getElementById("currentlyPlaying").style.color = textColor;
    }

    function startLogic(){
        document.addEventListener('DOMContentLoaded', function() {
            try {
                setInterval(refreshArtwork, 5000); // Change image every 5 seconds TODO undo comment later
                // setInterval(getPalette, 5000)
            } catch (error) {
                console.log(error);
            }
        });
    }

    async function getPalette() {
        try {
            // Same-origin relative path — the app serves on :8080, not :5000.
            const response = await fetch('/getPalette', {
                method: 'GET',
                headers: {
                    'Content-Type': 'application/json',
                },
            });

            // Check if the response is successful
            if (!response.ok) {
                throw new Error(`HTTP error! Status: ${response.status}`);
            }

            // Parse the JSON response
            const data = await response.json();
            const palette = data.palette;
            return palette[0];
        } catch (error) {
            console.error('Error fetching palette:', error);
            return null;
        }
    }

// console.log("fetching lights")
//     const response = await fetch("http://127.0.0.1:5000/turnOnLights")
//     message = response.json().message
//     console.log(message)

startLogic(); 
</script>
</html>
